[tools]
# common
apm = "latest"
gh = "latest"

# go
go = "1.26.2"
"go:golang.org/x/tools/gopls" = "0.21.1"

# goreleaser
goreleaser = "latest"

# Note: golangci-lint is intentionally NOT pinned — use the per-repo `tools/lint`
# Go module via `go tool lint ./...` (apm-plackage/go convention).
# Note: claude-code / codex / other coding-agent CLIs are intentionally NOT pinned per project policy.
# Note: python / uv / pipx-installed tools (serena, etc.) are intentionally NOT pinned
# — gopls MCP from apm-plackage/go covers Go-only code intelligence for this repo.

[tasks.worktree]
run = '''
create_worktree() {
    local branch_name=$1

    # メインリポジトリのディレクトリを取得
    local git_common=$(git rev-parse --git-common-dir)
    local main_repo=$(dirname "$git_common")

    # worktreesディレクトリを作成
    local new_worktree="${main_repo}/.worktrees/${branch_name}"
    mkdir -p "$new_worktree"

    git worktree add -b "$branch_name" "$new_worktree"
    echo "✓ worktreeを作成しました: $new_worktree"
    code "$new_worktree"
}
create_worktree $1
'''
description = "Create and checkout a new git worktree"
